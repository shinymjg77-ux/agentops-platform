services:
  postgres:
    image: postgres:16-alpine
    container_name: agentops-postgres
    environment:
      POSTGRES_DB: agentops
      POSTGRES_USER: agentops
      POSTGRES_PASSWORD: agentops
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentops -d agentops"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: agentops-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ../../apps/api
    container_name: agentops-api
    environment:
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: postgresql://agentops:agentops@postgres:5432/agentops
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"

  worker:
    build:
      context: ../../workers/celery_worker
    container_name: agentops-worker
    environment:
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: postgresql://agentops:agentops@postgres:5432/agentops
      ALERT_WEBHOOK_URL: ${ALERT_WEBHOOK_URL:-http://alert-sink:8080/events}
      API_BASE_URL: http://api:8000
      AGENT_NAME: agentops-worker-1
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      alert-sink:
        condition: service_started

  worker-2:
    build:
      context: ../../workers/celery_worker
    container_name: agentops-worker-2
    profiles: ["multiworker"]
    environment:
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: postgresql://agentops:agentops@postgres:5432/agentops
      ALERT_WEBHOOK_URL: ${ALERT_WEBHOOK_URL:-http://alert-sink:8080/events}
      API_BASE_URL: http://api:8000
      AGENT_NAME: agentops-worker-2
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      alert-sink:
        condition: service_started

  alert-sink:
    build:
      context: ../../apps/alert_sink
    container_name: agentops-alert-sink
    ports:
      - "18080:8080"

  dashboard:
    build:
      context: ../../apps/dashboard
    container_name: agentops-dashboard
    environment:
      API_BASE_URL: http://api:8000
    depends_on:
      - api
    ports:
      - "3000:3000"

  prometheus:
    image: prom/prometheus:v3.3.1
    container_name: agentops-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    volumes:
      - ../prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - api

  loki:
    image: grafana/loki:3.5.3
    container_name: agentops-loki
    command: ["-config.file=/etc/loki/loki-config.yaml"]
    volumes:
      - ../loki/loki-config.yaml:/etc/loki/loki-config.yaml:ro
    ports:
      - "3100:3100"

  grafana:
    image: grafana/grafana:12.1.0
    container_name: agentops-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ../grafana/provisioning:/etc/grafana/provisioning:ro
      - ../grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
      - loki
    ports:
      - "3001:3000"

volumes:
  postgres_data:
  grafana_data:
