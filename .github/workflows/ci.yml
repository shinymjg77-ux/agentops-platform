name: creator-dm-autopost-ci

on:
  push:
    paths:
      - 'creator-dm-autopost/**'
      - '.github/workflows/ci.yml'
  pull_request:
    paths:
      - 'creator-dm-autopost/**'
      - '.github/workflows/ci.yml'

jobs:
  api-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: creator-dm-autopost
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install API dependencies
        run: pip install -r api/requirements.txt

      - name: Install test dependencies
        run: pip install pytest

      - name: Compile API
        run: python -m compileall api

      - name: Alembic SQL dry-run
        working-directory: creator-dm-autopost/api
        run: alembic upgrade head --sql > /tmp/creator_dm_init.sql

      - name: Run API tests
        run: pytest -q tests/api

  worker-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: creator-dm-autopost
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install worker dependencies
        run: pip install -r worker/requirements.txt

      - name: Compile worker
        run: python -m compileall worker domain
